<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LiveChat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --surface:   #12121a;
      --border:    #1e1e2e;
      --accent:    #e8ff47;
      --accent2:   #47c8ff;
      --text:      #e8e8f0;
      --muted:     #555570;
      --radius:    12px;
      --font-ui:   'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Noise overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999;
    }

    /* ── JOIN SCREEN ── */
    #join-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 24px;
    }

    .logo {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .logo-mark {
      width: 64px; height: 64px;
      background: var(--accent);
      border-radius: 18px;
      display: grid; place-items: center;
      font-size: 28px;
      transform: rotate(-4deg);
      box-shadow: 0 0 40px rgba(232,255,71,.25);
    }
    .logo h1 {
      font-size: 2.6rem; font-weight: 800; letter-spacing: -1px;
      background: linear-gradient(135deg, #fff 40%, var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .logo p { color: var(--muted); font-size: 0.9rem; font-family: var(--font-mono); }

    .join-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      width: 100%; max-width: 400px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .join-card label { font-size: 0.78rem; font-family: var(--font-mono); color: var(--muted); letter-spacing: .08em; text-transform: uppercase; }
    .join-card input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 1.05rem;
      padding: 12px 16px;
      outline: none;
      transition: border-color .2s;
      width: 100%;
    }
    .join-card input:focus { border-color: var(--accent); }
    .btn-join {
      background: var(--accent);
      color: #0a0a0f;
      border: none; border-radius: var(--radius);
      font-family: var(--font-ui); font-weight: 600; font-size: 1rem;
      padding: 14px;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
    }
    .btn-join:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(232,255,71,.35); }
    .btn-join:active { transform: translateY(0); }

    /* ── CHAT LAYOUT ── */
    #chat-screen {
      display: none;
      flex: 1;
      flex-direction: column;
      overflow: hidden;
    }
    #chat-screen.active { display: flex; }

    /* Header */
    .chat-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      gap: 12px;
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-logo {
      width: 34px; height: 34px;
      background: var(--accent); border-radius: 9px;
      display: grid; place-items: center;
      font-size: 16px; font-weight: 800; color: #0a0a0f;
      flex-shrink: 0;
    }
    .header-title { font-size: 1rem; font-weight: 600; }
    .header-sub { font-size: 0.78rem; color: var(--muted); font-family: var(--font-mono); }

    /* Online users pill */
    #online-count {
      font-family: var(--font-mono); font-size: 0.78rem;
      background: rgba(71,200,255,.1);
      color: var(--accent2);
      border: 1px solid rgba(71,200,255,.2);
      border-radius: 100px;
      padding: 4px 12px;
      flex-shrink: 0;
    }
    #online-count::before { content: '● '; font-size: .6rem; }

    /* Main area */
    .chat-body {
      display: flex; flex: 1; overflow: hidden;
    }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 20px 8px;
      display: flex; flex-direction: column; gap: 4px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Sidebar */
    .sidebar {
      width: 180px;
      border-left: 1px solid var(--border);
      background: var(--surface);
      padding: 16px 14px;
      display: flex; flex-direction: column; gap: 10px;
      overflow-y: auto;
      flex-shrink: 0;
    }
    .sidebar-title {
      font-family: var(--font-mono); font-size: 0.7rem;
      color: var(--muted); letter-spacing: .1em; text-transform: uppercase;
    }
    .user-list { display: flex; flex-direction: column; gap: 6px; }
    .user-item {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.85rem; color: var(--text);
    }
    .user-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent); flex-shrink: 0;
      box-shadow: 0 0 6px rgba(232,255,71,.6);
    }
    .user-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Message bubbles */
    .msg-row {
      display: flex; flex-direction: column; gap: 2px;
      animation: fadeUp .2s ease both;
      max-width: 72%;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg-row.own { align-self: flex-end; align-items: flex-end; }
    .msg-row.other { align-self: flex-start; align-items: flex-start; }
    .msg-row.system { align-self: center; }

    .msg-meta {
      font-family: var(--font-mono); font-size: 0.68rem; color: var(--muted);
      padding: 0 6px;
    }
    .msg-bubble {
      padding: 9px 14px;
      border-radius: 14px;
      font-size: 0.92rem; line-height: 1.45;
      word-break: break-word;
    }
    .msg-row.own .msg-bubble {
      background: var(--accent); color: #0a0a0f;
      border-bottom-right-radius: 4px;
    }
    .msg-row.other .msg-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .msg-row.system .msg-bubble {
      background: transparent;
      font-family: var(--font-mono); font-size: 0.75rem;
      color: var(--muted); padding: 4px 10px;
      border: 1px dashed var(--border); border-radius: 100px;
    }

    /* Typing indicator */
    #typing-indicator {
      height: 20px; padding: 0 20px 4px;
      font-family: var(--font-mono); font-size: 0.72rem; color: var(--muted);
    }

    /* Input area */
    .chat-input-area {
      padding: 12px 16px 16px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex; gap: 10px; align-items: flex-end;
    }
    #msg-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-ui); font-size: 0.95rem;
      padding: 11px 14px;
      resize: none;
      min-height: 44px; max-height: 120px;
      outline: none;
      transition: border-color .2s;
      line-height: 1.4;
    }
    #msg-input:focus { border-color: var(--accent); }
    #send-btn {
      background: var(--accent); color: #0a0a0f;
      border: none; border-radius: var(--radius);
      width: 44px; height: 44px;
      cursor: pointer;
      display: grid; place-items: center;
      flex-shrink: 0;
      transition: transform .15s, box-shadow .15s;
    }
    #send-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(232,255,71,.35); }
    #send-btn:active { transform: translateY(0); }
    #send-btn svg { width: 18px; height: 18px; }

    @media (max-width: 560px) {
      .sidebar { display: none; }
      .msg-row { max-width: 86%; }
    }
  </style>
</head>
<body>

<!-- JOIN SCREEN -->
<div id="join-screen">
  <div class="logo">
    <div class="logo-mark">⚡</div>
    <h1>LiveChat</h1>
    <p>// real-time · multi-user · instant</p>
  </div>
  <div class="join-card">
    <label for="username-input">Choose your handle</label>
    <input id="username-input" type="text" placeholder="e.g. cosmicray_99" maxlength="20" autocomplete="off" />
    <button class="btn-join" id="join-btn">Enter Room →</button>
  </div>
</div>

<!-- CHAT SCREEN -->
<div id="chat-screen">
  <header class="chat-header">
    <div class="header-left">
      <div class="header-logo">⚡</div>
      <div>
        <div class="header-title">LiveChat</div>
        <div class="header-sub">// general</div>
      </div>
    </div>
    <div id="online-count">0 online</div>
  </header>

  <div class="chat-body">
    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
      <div id="messages"></div>
      <div id="typing-indicator"></div>
      <div class="chat-input-area">
        <textarea id="msg-input" rows="1" placeholder="Type a message…"></textarea>
        <button id="send-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
    <aside class="sidebar">
      <div class="sidebar-title">Online</div>
      <div class="user-list" id="user-list"></div>
    </aside>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();

  let myUsername = '';
  const typingUsers = {};
  let typingTimeout;

  const joinScreen  = document.getElementById('join-screen');
  const chatScreen  = document.getElementById('chat-screen');
  const usernameInput = document.getElementById('username-input');
  const joinBtn     = document.getElementById('join-btn');
  const messages    = document.getElementById('messages');
  const msgInput    = document.getElementById('msg-input');
  const sendBtn     = document.getElementById('send-btn');
  const userList    = document.getElementById('user-list');
  const onlineCount = document.getElementById('online-count');
  const typingEl    = document.getElementById('typing-indicator');

  // ── JOIN ──────────────────────────────────────────────
  function joinRoom() {
    const name = usernameInput.value.trim();
    if (!name) { usernameInput.focus(); return; }
    myUsername = name;
    socket.emit('user:join', name);
    joinScreen.style.display = 'none';
    chatScreen.classList.add('active');
    msgInput.focus();
  }

  joinBtn.addEventListener('click', joinRoom);
  usernameInput.addEventListener('keydown', e => { if (e.key === 'Enter') joinRoom(); });

  // ── SEND MESSAGE ──────────────────────────────────────
  function sendMessage() {
    const text = msgInput.value.trim();
    if (!text) return;
    socket.emit('chat:message', text);
    msgInput.value = '';
    msgInput.style.height = 'auto';
    socket.emit('chat:typing', false);
  }

  sendBtn.addEventListener('click', sendMessage);
  msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  // Auto-resize textarea
  msgInput.addEventListener('input', () => {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';

    socket.emit('chat:typing', true);
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => socket.emit('chat:typing', false), 1500);
  });

  // ── RENDER HELPERS ────────────────────────────────────
  function formatTime(ts) {
    return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function appendMessage({ username, text, timestamp }, type = 'other') {
    const row = document.createElement('div');
    row.className = `msg-row ${type}`;

    if (type !== 'system') {
      const meta = document.createElement('div');
      meta.className = 'msg-meta';
      meta.textContent = type === 'own' ? formatTime(timestamp) : `${username} · ${formatTime(timestamp)}`;
      row.appendChild(meta);
    }

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = text;
    row.appendChild(bubble);

    messages.appendChild(row);
    messages.scrollTop = messages.scrollHeight;
  }

  // ── SOCKET EVENTS ─────────────────────────────────────
  socket.on('chat:message', (msg) => {
    const type = msg.username === myUsername ? 'own' : 'other';
    appendMessage(msg, type);
  });

  socket.on('system:message', ({ text, timestamp }) => {
    appendMessage({ text, timestamp }, 'system');
  });

  socket.on('users:update', (users) => {
    onlineCount.textContent = `${users.length} online`;
    userList.innerHTML = users.map(u =>
      `<div class="user-item"><div class="user-dot"></div><div class="user-name">${u}</div></div>`
    ).join('');
  });

  socket.on('chat:typing', ({ username, isTyping }) => {
    if (isTyping) {
      typingUsers[username] = true;
    } else {
      delete typingUsers[username];
    }
    const names = Object.keys(typingUsers).filter(n => n !== myUsername);
    if (names.length === 0) { typingEl.textContent = ''; }
    else if (names.length === 1) { typingEl.textContent = `${names[0]} is typing…`; }
    else { typingEl.textContent = `${names.slice(0,-1).join(', ')} & ${names.at(-1)} are typing…`; }
  });
</script>
</body>
</html>
